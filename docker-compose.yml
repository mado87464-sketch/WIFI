version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:password@db:3306/wifi_derangement
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    depends_on:
      - db
    networks:
      - wifi-network
    restart: unless-stopped
    command: python app.py

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: wifi_derangement
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - wifi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app2:
    build: .
    ports:
      - "5001:5000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:password@db:3306/wifi_derangement
      - FLASK_ENV=development
      - FLASK_DEBUG=1
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wifi-network
    restart: unless-stopped
    command: python app.py

volumes:
  mysql_data:

networks:
  wifi-network:
    driver: bridge
