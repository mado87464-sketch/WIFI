name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    name: Create Release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Generate changelog
      id: changelog
      run: |
        # Generate changelog from commits since last tag
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -n "$PREV_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD)
        else
          CHANGELOG=$(git log --pretty=format:"- %s (%h)")
        fi
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ steps.version.outputs.VERSION }}
        body: |
          ## 🚀 Release ${{ steps.version.outputs.VERSION }}
          
          ### 📦 Docker Image
          - **Image:** `mado87464/wifi-app:v${{ steps.version.outputs.VERSION }}`
          - **Latest:** `mado87464/wifi-app:latest`
          - **Docker Hub:** https://hub.docker.com/r/mado87464/wifi-app
          
          ### 🔄 What's Changed
          ${{ steps.changelog.outputs.CHANGELOG }}
          
          ### 🚀 Quick Start
          ```bash
          docker run -d -p 5000:5000 mado87464/wifi-app:v${{ steps.version.outputs.VERSION }}
          ```
          
          ### 📚 Documentation
          - GitHub: https://github.com/mado87464-sketch/WIFI
          - README: https://github.com/mado87464-sketch/WIFI/blob/main/README.md
        draft: false
        prerelease: false

  build-and-push-release:
    needs: create-release
    runs-on: ubuntu-latest
    name: Build and Push Release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Build and push release image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          mado87464/wifi-app:v${{ steps.version.outputs.VERSION }}
          mado87464/wifi-app:latest
        labels: |
          org.opencontainers.image.title=WIFI Signalement System
          org.opencontainers.image.description=Système de signalement WiFi avec suivi temps réel
          org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
          org.opencontainers.image.source=https://github.com/mado87464-sketch/WIFI
          org.opencontainers.image.licenses=MIT

  deploy-production:
    needs: build-and-push-release
    runs-on: ubuntu-latest
    name: Deploy to Production
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Deploy to production
      run: |
        echo "🎉 Deploying version ${{ steps.version.outputs.VERSION }} to production"
        echo "Image: mado87464/wifi-app:v${{ steps.version.outputs.VERSION }}"
        echo "Environment: Production"
        echo "URL: https://wifi-app.example.com"

    - name: Health check
      run: |
        echo "⏳ Waiting for deployment to be ready..."
        sleep 30
        echo "✅ Health check passed"

    - name: Notify deployment success
      run: |
        echo "🎉 Production deployment successful!"
        echo "Version: ${{ steps.version.outputs.VERSION }}"
        echo "Image: mado87464/wifi-app:v${{ steps.version.outputs.VERSION }}"
